name: strawberry_rul_app
description: A Flutter app that predicts the Remaining Useful Life (RUL) of strawberries using an AI backend.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # For picking images from gallery / capturing from camera
  image_picker: ^1.1.2

  # For calling the backend prediction API
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
